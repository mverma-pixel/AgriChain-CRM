<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AgriChain CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <img src="{{ url_for('static', filename='img/logo.webp') }}" alt="AgriChain" style="max-width:200px;height:auto;display:block;margin:0 auto 0.25rem;"/>
        <p class="login-brand-sub">Customer Relationship Management</p>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" style="margin-bottom:1rem;">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST" action="{{ url_for('auth.login') }}" id="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Enter your username" required autofocus/>
        </div>

        <div class="form-group" style="margin-top:1rem;">
          <label class="form-label" for="password">Password</label>
          <div class="password-field-wrap">
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Enter your password" required/>
            <button type="button" class="pw-toggle" onclick="togglePassword()" aria-label="Show/hide password" tabindex="-1">
              <svg id="pw-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="pw-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:1.5rem;">
          Log In
        </button>
      </form>

      <div style="text-align:center;margin-top:1.25rem;">
        <button type="button" class="btn-link" onclick="openModal('reset-pw-modal')"
                style="font-size:0.82rem;color:var(--text-muted);">
          Reset your password
        </button>
      </div>

    </div>
  </div>

  <!-- Reset Password Modal -->
  <div id="reset-pw-modal" class="modal hidden">
    <div class="modal-backdrop" onclick="closeModal('reset-pw-modal')"></div>
    <div class="modal-dialog modal-sm" style="margin-top:25vh;">
      <div class="modal-header">
        <h3>Reset Password</h3>
        <button class="modal-close" onclick="closeModal('reset-pw-modal')">&times;</button>
      </div>
      <div class="modal-body" style="text-align:center;padding:2rem 1.5rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--secondary-mid)" stroke-width="1.5"
             style="width:40px;height:40px;margin-bottom:1rem;">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <p style="font-size:0.95rem;color:var(--text);">
          Please contact your admin to reset your password.
        </p>
      </div>
      <div class="modal-footer" style="justify-content:center;">
        <button class="btn btn-primary" onclick="closeModal('reset-pw-modal')">OK, got it</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      const eyeOpen   = document.getElementById('pw-eye-open');
      const eyeClosed = document.getElementById('pw-eye-closed');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.style.display   = 'none';
        eyeClosed.style.display = 'block';
      } else {
        input.type = 'password';
        eyeOpen.style.display   = 'block';
        eyeClosed.style.display = 'none';
      }
    }
  </script>
</body>
</html>
